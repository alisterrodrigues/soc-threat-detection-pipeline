rules:
  - id: "PA-001"
    name: "LSASS Memory Access"
    description: "Detects any process opening a handle to lsass.exe — a broad but high-signal indicator of credential dumping activity. Use as a hunting rule; tune with SourceImage allowlists in production."
    severity: critical
    mitre_technique: "T1003.001"
    mitre_tactic: "Credential Access"
    event_id: 10
    conditions:
      - field: "TargetImage"
        operator: endswith
        value: "lsass.exe"
        case_insensitive: true
    logic: AND
    false_positive_notes: "AV, EDR, and backup agents legitimately access lsass. Build an allowlist of known SourceImage paths for your environment."
    tuning_tag: "lsass_access"

  - id: "PA-002"
    name: "High-Privilege Access Mask on LSASS"
    description: "Detects access masks commonly seen in credential dumping tools requested against lsass.exe. Masks 0x1010, 0x1410, 0x1438, 0x143a, 0x1f0fff, and 0x1fffff grant rights sufficient to read process memory and extract credentials."
    severity: critical
    mitre_technique: "T1003.001"
    mitre_tactic: "Credential Access"
    event_id: 10
    conditions:
      - field: "TargetImage"
        operator: endswith
        value: "lsass.exe"
        case_insensitive: true
      - field: "GrantedAccess"
        operator: regex
        value: "^0x(?:1010|1410|1438|143a|1f0fff|1fffff)$"
        case_insensitive: true
    logic: AND
    false_positive_notes: "Some legitimate security products use these masks. Correlate SourceImage against a known-good allowlist before escalating."
    tuning_tag: "lsass_suspicious_access_mask"

  - id: "PA-003"
    name: "Non-System Binary Accessing Sensitive Process"
    description: "Detects processes outside C:\\Windows\\System32 opening handles to lsass, winlogon, or csrss — a heuristic hunting indicator for injection or dumping. Requires environmental tuning before use as a high-confidence alert."
    severity: high
    mitre_technique: "T1055"
    mitre_tactic: "Defense Evasion"
    event_id: 10
    conditions:
      - field: "TargetImage"
        operator: regex
        value: "(lsass|winlogon|csrss)\\.exe$"
        case_insensitive: true
      - field: "SourceImage"
        operator: not_contains
        value: "C:\\Windows\\System32"
        case_insensitive: true
    logic: AND
    false_positive_notes: "Third-party security tools installed outside System32 will trigger this. Verify SourceImage path, signing status, and GrantedAccess before escalating."
    tuning_tag: "sensitive_process_access"
