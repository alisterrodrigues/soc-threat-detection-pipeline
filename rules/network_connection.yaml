rules:
  - id: "NET-001"
    name: "Browser Outbound on Non-Standard Port"
    description: "Detects common browsers making outbound connections on ports other than 80/443 — potential C2 traffic tunneling"
    severity: medium
    mitre_technique: "T1571"
    mitre_tactic: "Command and Control"
    event_id: 3
    conditions:
      - field: "Image"
        operator: contains
        value: "chrome.exe"
        case_insensitive: true
      - field: "DestinationPort"
        operator: not_contains
        value: "443"
        case_insensitive: false
    logic: AND
    false_positive_notes: "Some web apps use alternate ports. Verify destination and whether connection is expected."
    tuning_tag: "browser_nonstandard_port"

  - id: "NET-002"
    name: "Connection to IP Address Without Hostname"
    description: "Detects outbound connections where the destination has no DNS hostname — potential C2 beacon to hardcoded IP"
    severity: medium
    mitre_technique: "T1071.004"
    mitre_tactic: "Command and Control"
    event_id: 3
    conditions:
      - field: "DestinationHostname"
        operator: equals
        value: ""
        case_insensitive: false
    logic: AND
    false_positive_notes: "Some internal tools connect to IPs directly. Validate destination IP against known-good list."
    tuning_tag: "direct_ip_connection"

  - id: "NET-003"
    name: "Scripting Host Network Connection"
    description: "Detects wscript.exe or cscript.exe initiating network connections — scripts rarely need direct network access"
    severity: high
    mitre_technique: "T1059.005"
    mitre_tactic: "Execution"
    event_id: 3
    conditions:
      - field: "Image"
        operator: contains
        value: "wscript.exe"
        case_insensitive: true
    logic: AND
    false_positive_notes: "Legitimate VBScript may contact internal shares. Verify destination and script origin."
    tuning_tag: "scripting_host_network"
